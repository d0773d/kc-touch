    category: surface
    value:
      backgroundColor: "#0F172A"
      color: "#E2E8F0"
      borderRadius: 12
      padding: 16

  light.hero:
    name: "Hero Card"
    category: surface
    value:
      backgroundColor: "#111827"
      color: "#F8FAFC"
      borderRadius: 16
      padding: 20
  dark.hero:
    name: "Hero Card"
    category: surface
    value:
      backgroundColor: "#111827"
      color: "#F8FAFC"
      borderRadius: 16
      padding: 20

  light.cta:
    name: "CTA"
    category: surface
    value:
      backgroundColor: "#22D3EE"
      color: "#0F172A"
      borderRadius: 999
      paddingHorizontal: 24
      paddingVertical: 12
  dark.cta:
    name: "CTA"
    category: surface
    value:
      backgroundColor: "#22D3EE"
      color: "#0F172A"
      borderRadius: 999
      paddingHorizontal: 24
      paddingVertical: 12

  light.ghost:
    name: "Ghost"
    category: surface
    value:
      backgroundColor: "#1F2937"
      color: "#E5E7EB"
      borderRadius: 999
      paddingHorizontal: 18
      paddingVertical: 10
  dark.ghost:
    name: "Ghost"
    category: surface
    value:
      backgroundColor: "#1F2937"
      color: "#E5E7EB"
      borderRadius: 999
      paddingHorizontal: 18
      paddingVertical: 10

  light.heading:
    name: "Heading"
    category: text
    value:
      color: "#94A3B8"
