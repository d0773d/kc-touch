theme:
  defaults:
    label: body
    panel: card
    button: ghost
    textarea: card
    keyboard: card

styles:
  light.card:
    name: "Card"
    category: surface
    value:
      backgroundColor: "#0F172A"
      color: "#E2E8F0"
      borderRadius: 12
      padding: 16
  dark.card:
    name: "Card"
    category: surface
    value:
      backgroundColor: "#0F172A"
      color: "#E2E8F0"
      borderRadius: 12
      padding: 16

  light.hero:
    name: "Hero Card"
    category: surface
    value:
      backgroundColor: "#111827"
      color: "#F8FAFC"
      borderRadius: 16
      padding: 20
  dark.hero:
    name: "Hero Card"
    category: surface
    value:
      backgroundColor: "#111827"
      color: "#F8FAFC"
      borderRadius: 16
      padding: 20

  light.cta:
    name: "CTA"
    category: surface
    value:
      backgroundColor: "#22D3EE"
      color: "#0F172A"
      borderRadius: 999
      paddingHorizontal: 24
      paddingVertical: 12
  dark.cta:
    name: "CTA"
    category: surface
    value:
      backgroundColor: "#22D3EE"
      color: "#0F172A"
      borderRadius: 999
      paddingHorizontal: 24
      paddingVertical: 12

  light.ghost:
    name: "Ghost"
    category: surface
    value:
      backgroundColor: "#1F2937"
      color: "#E5E7EB"
      borderRadius: 999
      paddingHorizontal: 18
      paddingVertical: 10
  dark.ghost:
    name: "Ghost"
    category: surface
    value:
      backgroundColor: "#1F2937"
      color: "#E5E7EB"
      borderRadius: 999
      paddingHorizontal: 18
      paddingVertical: 10

  light.heading:
    name: "Heading"
    category: text
    value:
      color: "#94A3B8"
      fontSize: 20
      fontWeight: 600
  dark.heading:
    name: "Heading"
    category: text
    value:
      color: "#94A3B8"
      fontSize: 20
      fontWeight: 600

  light.body:
    name: "Body"
    category: text
    value:
      color: "#CBD5E1"
      fontSize: 14
      fontWeight: 400
  dark.body:
    name: "Body"
    category: text
    value:
      color: "#CBD5E1"
      fontSize: 14
      fontWeight: 400

  light.stat-label:
    name: "Stat Label"
    category: text
    value:
      color: "#94A3B8"
      fontSize: 14
      fontWeight: 500
  dark.stat-label:
    name: "Stat Label"
    category: text
    value:
      color: "#94A3B8"
      fontSize: 14
      fontWeight: 500

  light.stat-value:
    name: "Stat Value"
    category: text
    value:
      color: "#F8FAFC"
      fontSize: 32
      fontWeight: 700
  dark.stat-value:
    name: "Stat Value"
    category: text
    value:
      color: "#F8FAFC"
      fontSize: 32
      fontWeight: 700

components:
  stat_card:
    description: "Metric card"
    props: {}
    prop_schema:
      - name: label_key
        type: string
        required: true
      - name: value
        type: number
        required: true
      - name: unit
        type: string
        required: false
        default: ""
    widgets:
      - type: column
        style: card
        layout:
          type: column
          gap: 6
        widgets:
          - type: label
            text_key: "{{label_key}}"
            style: stat-label
          - type: label
            text: "{{value}}{{unit}}"
            style: stat-value

  routine_modal:
    description: "Modal demo"
    props: {}
    widgets:
      - type: column
        layout:
          type: column
          gap: 10
        widgets:
          - type: label
            text_key: "modal.title"
            style: heading
          - type: label
            text_key: "modal.body"
            style: body
          - type: row
            layout:
              type: row
              gap: 10
            widgets:
              - type: button
                text_key: "modal.close"
                style: ghost
                on_click: close_modal()
              - type: button
                text_key: "modal.start"
                style: cta
                on_click:
                  - set(welcome_message, status.modal)
                  - close_modal()

screens:
  showcase_diag:
    name: showcase_diag
    title: "Menu Path Diagnostic"
    layout:
      type: column
      gap: 16
    widgets:
      - type: panel
        style: hero
        layout:
          type: column
          gap: 12
        widgets:
          - type: label
            text: "Menu Path Diagnostic"
            style: heading
          - type: label
            text: "This screen keeps the dashboard path minimal while preserving showcase -> widgets -> menu navigation."
            style: body
          - type: button
            text_key: "actions.open_widgets"
            style: cta
            on_click: push(widgets)

  showcase:
    name: showcase
    title: "YamUI Showcase"
    initial: true
    layout:
      type: column
      gap: 16
    widgets:
      - type: column
        id: main-column
        layout:
          type: column
          gap: 16
        width: "100%"
        widgets:
          - type: panel
            style: hero
            layout:
              type: column
              gap: 8
            widgets:
              - type: label
                text_key: "app.title"
                style: heading
              - type: label
                text_key: "app.subtitle"
                style: body

          - type: row
            id: metrics-row
            layout:
              type: row
              gap: 12
            width: "100%"
            widgets:
              - type: stat_card
                grow: 1
                props:
                  label_key: "cards.temperature"
                  value: "{{state.ui.temperature}}"
                  unit: "°"
              - type: stat_card
                grow: 1
                props:
                  label_key: "cards.humidity"
                  value: "{{state.ui.humidity}}"
                  unit: "%"
              - type: stat_card
                grow: 1
                props:
                  label_key: "cards.pressure"
                  value: "{{state.ui.pressure}}"
                  unit: " hPa"

          - type: panel
            style: card
            props:
              title_key: "panel.controls"
            layout:
              type: column
              gap: 10
            widgets:
              - type: row
                layout:
                  type: row
                  gap: 10
                  align: center
                widgets:
                  - type: label
                    text_key: "labels.theme"
                    style: heading
                  - type: switch
                    value: "{{state.ui.dark_mode}}"
                    on_change: set(ui.dark_mode, {{checked}})

              - type: row
                layout:
                  type: row
                  gap: 10
                widgets:
                  - type: button
                    text_key: "actions.english"
                    style: cta
                    on_click: set(ui.locale, en)
                  - type: button
                    text_key: "actions.spanish"
                    style: cta
                    on_click: set(ui.locale, es)

              - type: row
                layout:
                  type: row
                  gap: 12
                  align: center
                widgets:
                  - type: label
                    text_key: "labels.auto_start"
                    style: heading
                  - type: switch
                    value: "{{state.network.auto_start}}"
                    on_change: set(network.auto_start, {{checked}})
                  - type: checkbox
                    text_key: "labels.alerts"
                    value: "{{state.ui.alerts_enabled}}"
                    on_change: set(ui.alerts_enabled, {{checked}})
                  - type: spacer
                    size: 16
                  - type: label
                    text_key: "labels.security"
                    style: heading
                  - type: dropdown
                    value: "{{state.network.security}}"
                    options:
                      - Open
                      - WPA2
                      - WPA3
                    on_change: set(network.security, {{value}})

              - type: row
                layout:
                  type: row
                  gap: 10
                widgets:
                  - type: button
                    text_key: "actions.sync"
                    style: cta
                    enabled_if: "!state.async.sync_demo.running"
                    on_click:
                      - call(ui_async_reset, sync_demo)
                      - call(demo_async_sync, sync_demo)
                  - type: button
                    text_key: "actions.reset"
                    style: ghost
                    enabled_if: "!state.async.sync_demo.running"
                    on_click:
                      - call(ui_async_reset, sync_demo, status.sync_idle)
                      - set(welcome_message, status.ready)
                  - type: button
                    text_key: "actions.details"
                    style: ghost
                    on_click: push(details)
                  - type: button
                    text_key: "actions.modal"
                    style: ghost
                    on_click: modal(routine_modal)

              - type: label
                text: "Brightness: {{state.display.brightness}}"
                style: stat-label
              - type: slider
                min: 0
                max: 100
                value: "{{state.display.brightness}}"
                on_change: set(display.brightness, {{value}})
              - type: bar
                min: 0
                max: 100
                value: "{{state.display.brightness}}"
              - type: arc
                min: 0
                max: 100
                value: "{{state.display.brightness}}"
                on_change: set(display.brightness, {{value}})
              - type: label
                text: "Sync status: {{state.async.sync_demo.status}}"
                style: body
              - type: label
                text: "Progress: {{state.async.sync_demo.progress}}%"
                style: body

          - type: panel
            style: card
            props:
              title_key: "panel.profile"
            layout:
              type: column
              gap: 8
            widgets:
              - type: label
                text_key: "labels.profile_name"
                style: stat-label
              - type: textarea
                id: profile-name
                text: "{{state.profile.name}}"
                placeholder_key: "labels.profile_name"
                on_change: set(profile.name, {{value}})
              - type: label
                text_key: "labels.profile_note"
                style: stat-label
              - type: textarea
                id: profile-note
                text: "{{state.profile.note}}"
                placeholder_key: "labels.profile_note"
                on_focus: set(ui.keyboard_visible, true)
                on_blur: set(ui.keyboard_visible, false)
                on_change: set(profile.note, {{value}})

          - type: panel
            style: card
            props:
              title_key: "panel.camera"
            layout:
              type: column
              gap: 8
            widgets:
              - type: label
                text: "Camera preview loads only when opened."
                style: body
              - type: button
                text_key: "actions.open_camera"
                style: cta
                enabled_if: "!state.async.sync_demo.running"
                on_click: push(camera)
              - type: button
                text_key: "actions.open_widgets"
                style: ghost
                enabled_if: "!state.async.sync_demo.running"
                on_click: push(widgets)

          - type: row
            id: nav-row-3
            layout:
              type: row
              gap: 10
            widgets:
              - type: button
                text_key: "actions.open_new_widgets"
                style: cta
                on_click: push(new_widgets)
              - type: button
                text_key: "actions.open_grid"
                style: ghost
                on_click: push(grid_demo)

      - type: keyboard
        overlay: true
        visible_if: state.ui.keyboard_visible
        height: 300
        target: profile-note

  details:
    name: details
    title: "Details"
    layout:
      type: column
      gap: 16
    widgets:
      - type: panel
        style: hero
        layout:
          type: column
          gap: 8
        widgets:
          - type: label
            text_key: "screen.details"
            style: heading
          - type: label
            text_key: "detail.status"
            style: stat-label
          - type: label
            text_key: "{{state.welcome_message}}"
            style: body
          - type: label
            text: "Progress: {{state.async.sync_demo.progress}}%"
            style: body
          - type: label
            text: "Sync Count: {{state.ui.sync_count}}"
            style: body
          - type: button
            text_key: "actions.open_widgets"
            style: ghost
            on_click: push(widgets)
          - type: button
            text_key: "screen.back"
            style: cta
            on_click: pop()

  camera:
    name: camera
    title: "Camera"
    layout:
      type: column
      gap: 16
    widgets:
      - type: panel
        style: hero
        layout:
          type: column
          gap: 12
        widgets:
          - type: label
            text_key: "screen.camera"
            style: heading
          - type: camera_preview
            height: 260
          - type: button
            text_key: "screen.back"
            style: cta
            on_click: pop()

  widgets:
    name: widgets
    title: "Widgets"
    layout:
      type: column
      gap: 16
    widgets:
      - type: panel
        style: hero
        layout:
          type: column
          gap: 12
        widgets:
          - type: label
            text_key: "screen.widgets"
            style: heading
          - type: label
            text: "Lightweight LVGL widgets can be grouped here without living on the home screen."
            style: body
      - type: panel
        style: card
        props:
          title: "Roller"
        layout:
          type: column
          gap: 8
        widgets:
          - type: roller
            visible_row_count: 3
            options:
              - Eco
              - Balanced
              - Boost
              - Silent
            value: "{{state.demo.mode}}"
            on_change: set(demo.mode, {{value}})
          - type: label
            text: "Selected mode: {{state.demo.mode}}"
            style: body
      - type: panel
        style: card
        props:
          title: "LED"
        layout:
          type: column
          gap: 8
        widgets:
          - type: row
            layout:
              type: row
              gap: 12
              align: center
            widgets:
              - type: led
                width: 26
                height: 26
                color: "#22d3ee"
                value: "{{state.demo.led_level}}"
              - type: label
                text: "LED level: {{state.demo.led_level}}"
                style: body
          - type: slider
            min: 0
            max: 255
            value: "{{state.demo.led_level}}"
            on_change: set(demo.led_level, {{value}})
      - type: panel
        style: card
        props:
          title: "Table"
        layout:
          type: column
          gap: 8
        widgets:
          - type: label
            text: "Table is isolated on its own screen while we finish stabilizing it."
            style: body
          - type: button
            text_key: "actions.open_table"
            style: ghost
            enabled_if: "!state.async.sync_demo.running"
            on_click: push(table_demo)
      - type: panel
        style: card
        props:
          title: "Chart"
        layout:
          type: column
          gap: 8
        widgets:
          - type: label
            text: "Chart is isolated on its own screen while we validate structured series rendering."
            style: body
          - type: button
            text_key: "actions.open_chart"
            style: ghost
            enabled_if: "!state.async.sync_demo.running"
            on_click: push(chart_demo)
      - type: panel
        style: card
        props:
          title: "Calendar"
        layout:
          type: column
          gap: 8
        widgets:
          - type: label
            text: "Calendar stays on its own screen while we validate date rendering and highlighted days."
            style: body
          - type: button
            text_key: "actions.open_calendar"
            style: ghost
            enabled_if: "!state.async.sync_demo.running"
            on_click: push(calendar_demo)
      - type: panel
        style: card
        props:
          title: "Tabview"
        layout:
          type: column
          gap: 8
        widgets:
          - type: label
            text: "Tabview is isolated on its own screen while we validate nested widget rendering inside tabs."
            style: body
          - type: button
            text_key: "actions.open_tabview"
            style: ghost
            enabled_if: "!state.async.sync_demo.running"
            on_click: push(tabview_demo)
      - type: panel
        style: card
        props:
          title: "Menu"
        layout:
          type: column
          gap: 8
        widgets:
          - type: label
            text: "Menu works in a simplified isolated screen and is being validated there."
            style: body
          - type: button
            text_key: "actions.open_menu"
            style: ghost
            enabled_if: "!state.async.sync_demo.running"
            on_click: push(menu_demo)
      - type: button
        text_key: "screen.back"
        style: cta
        on_click: pop()

  table_demo:
    name: table_demo
    title: "Table"
    layout:
      type: column
      gap: 16
    widgets:
      - type: panel
        style: hero
        layout:
          type: column
          gap: 12
        widgets:
          - type: label
            text_key: "screen.table"
            style: heading
          - type: table
            height: 180
            column_widths:
              - 150
              - 150
            rows:
              - first: Widget
                second: State
              - first: Roller
                second: "{{state.demo.mode}}"
              - first: LED
                second: "{{state.demo.led_level}}"
              - first: Camera
                second: On demand
          - type: button
            text_key: "screen.back"
            style: cta
            on_click: pop()

  chart_demo:
    name: chart_demo
    title: "Chart"
    layout:
      type: column
      gap: 16
    widgets:
      - type: panel
        style: hero
        layout:
          type: column
          gap: 12
        widgets:
          - type: label
            text_key: "screen.chart"
            style: heading
          - type: chart
            height: 220
            chart_type: line
            point_count: 7
            min: 0
            max: 100
            horizontal_dividers: 5
            vertical_dividers: 7
            series:
              - color: "#22d3ee"
                axis: primary_y
                values:
                  - 18
                  - 36
                  - 52
                  - 47
                  - 61
                  - 74
                  - 68
              - color: "#f59e0b"
                axis: primary_y
                values:
                  - 10
                  - 22
                  - 34
                  - 58
                  - 49
                  - 63
                  - 81
          - type: button
            text_key: "screen.back"
            style: cta
            on_click: pop()

  calendar_demo:
    name: calendar_demo
    title: "Calendar"
    layout:
      type: column
      gap: 16
    widgets:
      - type: panel
        style: hero
        layout:
          type: column
          gap: 12
        widgets:
          - type: label
            text_key: "screen.calendar"
            style: heading
          - type: calendar
            height: 280
            today: "2026-04-02"
            shown_month: "2026-04-01"
            highlighted_dates:
              - "2026-04-02"
              - "2026-04-07"
              - "2026-04-18"
              - "2026-04-26"
          - type: button
            text_key: "screen.back"
            style: cta
            on_click: pop()

  tabview_demo:
    name: tabview_demo
    title: "Tabview"
    layout:
      type: column
      gap: 16
    widgets:
      - type: panel
        style: hero
        layout:
          type: column
          gap: 12
        widgets:
          - type: label
            text_key: "screen.tabview"
            style: heading
          - type: tabview
            height: 280
            tab_bar_position: top
            tab_bar_size: 44
            active_tab: 0
            tabs:
              - title: "Status"
                widgets:
                  - type: label
                    text: "Device mode: {{state.demo.mode}}"
                    style: body
                  - type: label
                    text: "LED level: {{state.demo.led_level}}"
                    style: body
              - title: "Controls"
                widgets:
                  - type: slider
                    min: 0
                    max: 255
                    value: "{{state.demo.led_level}}"
                    on_change: set(demo.led_level, {{value}})
                  - type: checkbox
                    text_key: "labels.alerts"
                    value: "{{state.ui.alerts_enabled}}"
                    on_change: set(ui.alerts_enabled, {{checked}})
              - title: "Notes"
                widgets:
                  - type: label
                    text: "Tab content can host normal YamUI widgets, not just plain labels."
                    style: body
                  - type: button
                    text_key: "actions.sync"
                    style: ghost
                    enabled_if: "!state.async.sync_demo.running"
                    on_click:
                      - call(ui_async_reset, sync_demo)
                      - call(demo_async_sync, sync_demo)
          - type: button
            text_key: "screen.back"
            style: cta
            on_click: pop()

  menu_demo:
    name: menu_demo
    title: "Menu"
    layout:
      type: column
      gap: 12
    widgets:
      - type: label
        text_key: "screen.menu"
        style: heading
      - type: label
        text: "Menu works in isolation. This screen is the next step in validating it from the normal app flow."
        style: body
      - type: menu
        width: "100%"
        height: 620
        root_title: "Settings"
        header_mode: top_fixed
        root_back_button: false
        items:
          - title: "Connectivity"
            page:
              title: "Connectivity"
              widgets:
                - type: label
                  text: "SSID: {{state.network.ssid}}"
                  style: body
                - type: label
                  text: "Security: {{state.network.security}}"
                  style: body
          - title: "Display"
            page:
              title: "Display"
              widgets:
                - type: label
                  text: "Brightness: {{state.display.brightness}}"
                  style: body
                - type: label
                  text: "Dark theme: {{state.ui.dark_mode}}"
                  style: body
          - title: "Status"
            page:
              title: "Status"
              widgets:
                - type: label
                  text: "Sync Count: {{state.ui.sync_count}}"
                  style: body
                - type: label
                  text: "Mode: {{state.demo.mode}}"
                  style: body
      - type: button
        text_key: "screen.back"
        style: cta
        on_click: pop()

  new_widgets:
    name: new_widgets
    title: "New Widgets"
    layout:
      type: column
      gap: 16
    widgets:
      - type: panel
        style: hero
        layout:
          type: column
          gap: 12
        widgets:
          - type: label
            text_key: "screen.new_widgets"
            style: heading
          - type: label
            text: "Showcase of newly added LVGL widgets: spinner, line, QR code, spinbox, scale, button matrix, message box, and span."
            style: body

      - type: panel
        style: card
        props:
          title: "Spinner"
        layout:
          type: column
          gap: 8
        widgets:
          - type: label
            text: "Animated loading indicator with configurable speed and sweep."
            style: body
          - type: row
            layout:
              type: row
              gap: 12
            widgets:
              - type: spinner
                props:
                  duration: 1000
                  arc_sweep: 240
              - type: spinner
                props:
                  duration: 600
                  arc_sweep: 300
              - type: spinner
                props:
                  duration: 2000
                  arc_sweep: 180

      - type: panel
        style: card
        props:
          title: "Line"
        layout:
          type: column
          gap: 8
        widgets:
          - type: label
            text: "Points connected by line segments."
            style: body
          - type: line
            props:
              points:
                - [0, 0]
                - [40, 30]
                - [80, 5]
                - [120, 35]
                - [160, 10]
                - [200, 25]

      - type: panel
        style: card
        props:
          title: "QR Code"
        layout:
          type: column
          gap: 8
        widgets:
          - type: label
            text: "Encode any text or URL as a QR code."
            style: body
          - type: qrcode
            props:
              data: "https://github.com/epicgrowers/kc-touch"
              size: 150

      - type: panel
        style: card
        props:
          title: "Spinbox"
        layout:
          type: column
          gap: 8
        widgets:
          - type: label
            text: "Numeric input with digit selection."
            style: body
          - type: spinbox
            props:
              value: 42
              min: -999
              max: 999
              step: 1
              digit_count: 4
              decimal_pos: 0

      - type: panel
        style: card
        props:
          title: "Scale"
        layout:
          type: column
          gap: 8
        widgets:
          - type: label
            text: "Gauge scale with tick marks and labels."
            style: body
          - type: scale
            props:
              mode: horizontal
              range_min: 0
              range_max: 100
              tick_count: 21
              major_tick_every: 5
              label_show: true

      - type: panel
        style: card
        props:
          title: "Button Matrix"
        layout:
          type: column
          gap: 8
        widgets:
          - type: label
            text: "Grid of buttons from a string array (phone keypad)."
            style: body
          - type: buttonmatrix
            props:
              map:
                - 1
                - 2
                - 3
                - NEWLINE
                - 4
                - 5
                - 6
                - NEWLINE
                - 7
                - 8
                - 9
                - NEWLINE
                - "*"
                - 0
                - "#"

      - type: panel
        style: card
        props:
          title: "Message Box"
        layout:
          type: column
          gap: 8
        widgets:
          - type: label
            text: "Modal alert or confirm dialog."
            style: body
          - type: msgbox
            props:
              title: "Confirm Action"
              content_text: "Are you sure you want to proceed?"
              close_button: true
              buttons: ["Cancel", "OK"]

      - type: panel
        style: card
        props:
          title: "Span (Rich Text)"
        layout:
          type: column
          gap: 8
        widgets:
          - type: label
            text: "Mixed-style text in a single widget."
            style: body
          - type: span
            props:
              mode: break
              spans:
                - text: "Temperature: "
                - text: "22°C "
                  style: stat-value
                - text: "Humidity: "
                - text: "48%"
                  style: stat-value

      - type: button
        text_key: "screen.back"
        style: cta
        on_click: pop()

  grid_demo:
    name: grid_demo
    title: "Grid Demo"
    layout:
      type: column
      gap: 16
    widgets:
      - type: panel
        style: hero
        layout:
          type: column
          gap: 12
        widgets:
          - type: label
            text_key: "screen.grid"
            style: heading
          - type: label
            text: "CSS Grid-style layout with fractional units, spanning, and alignment."
            style: body

      - type: panel
        style: card
        props:
          title: "Metrics Dashboard (3-col grid)"
        layout:
          type: grid
          columns: ["1fr", "1fr", "1fr"]
          rows: ["auto", "auto"]
          column_gap: 8
          row_gap: 8
        widgets:
          - type: label
            text: "{{state.ui.temperature}}°"
            style: stat-value
            grid_cell:
              col: 0
              row: 0
          - type: label
            text: "{{state.ui.humidity}}%"
            style: stat-value
            grid_cell:
              col: 1
              row: 0
          - type: label
            text: "{{state.ui.pressure}} hPa"
            style: stat-value
            grid_cell:
              col: 2
              row: 0
          - type: label
            text: "Temperature"
            style: stat-label
            grid_cell:
              col: 0
              row: 1
          - type: label
            text: "Humidity"
            style: stat-label
            grid_cell:
              col: 1
              row: 1
          - type: label
            text: "Pressure"
            style: stat-label
            grid_cell:
              col: 2
              row: 1

      - type: panel
        style: card
        props:
          title: "Col-span Demo (2-col grid)"
        layout:
          type: grid
          columns: ["1fr", "1fr"]
          rows: ["auto", "auto", "auto"]
          column_gap: 8
          row_gap: 8
        widgets:
          - type: label
            text: "Status Overview"
            style: heading
            grid_cell:
              col: 0
              row: 0
              col_span: 2
          - type: bar
            min: 0
            max: 100
            value: "{{state.display.brightness}}"
            grid_cell:
              col: 0
              row: 1
          - type: arc
            min: 0
            max: 100
            value: "{{state.display.brightness}}"
            on_change: set(display.brightness, {{value}})
            grid_cell:
              col: 1
              row: 1
          - type: label
            text: "All systems operational"
            style: body
            grid_cell:
              col: 0
              row: 2
              col_span: 2

      - type: button
        text_key: "screen.back"
        style: cta
        on_click: pop()
