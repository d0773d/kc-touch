theme:
  defaults:
    label: body
    panel: card
    button: ghost
    textarea: card
    keyboard: card

styles:
  light.card:
    name: "Card"
    category: surface
    value:
      backgroundColor: "#0F172A"
      color: "#E2E8F0"
      borderRadius: 12
      padding: 16
  dark.card:
    name: "Card"
    category: surface
    value:
      backgroundColor: "#0F172A"
      color: "#E2E8F0"
      borderRadius: 12
      padding: 16

  light.hero:
    name: "Hero Card"
    category: surface
    value:
      backgroundColor: "#111827"
      color: "#F8FAFC"
      borderRadius: 16
      padding: 20
  dark.hero:
    name: "Hero Card"
    category: surface
    value:
      backgroundColor: "#111827"
      color: "#F8FAFC"
      borderRadius: 16
      padding: 20

  light.cta:
    name: "CTA"
    category: surface
    value:
      backgroundColor: "#22D3EE"
      color: "#0F172A"
      borderRadius: 999
      paddingHorizontal: 24
      paddingVertical: 12
  dark.cta:
    name: "CTA"
    category: surface
    value:
      backgroundColor: "#22D3EE"
      color: "#0F172A"
      borderRadius: 999
      paddingHorizontal: 24
      paddingVertical: 12

  light.ghost:
    name: "Ghost"
    category: surface
    value:
      backgroundColor: "#1F2937"
      color: "#E5E7EB"
      borderRadius: 999
      paddingHorizontal: 18
      paddingVertical: 10
  dark.ghost:
    name: "Ghost"
    category: surface
    value:
      backgroundColor: "#1F2937"
      color: "#E5E7EB"
      borderRadius: 999
      paddingHorizontal: 18
      paddingVertical: 10

  light.heading:
    name: "Heading"
    category: text
    value:
      color: "#94A3B8"
      fontSize: 20
      fontWeight: 600
  dark.heading:
    name: "Heading"
    category: text
    value:
      color: "#94A3B8"
      fontSize: 20
      fontWeight: 600

  light.body:
    name: "Body"
    category: text
    value:
      color: "#CBD5E1"
      fontSize: 14
      fontWeight: 400
  dark.body:
    name: "Body"
    category: text
    value:
      color: "#CBD5E1"
      fontSize: 14
      fontWeight: 400

  light.stat-label:
    name: "Stat Label"
    category: text
    value:
      color: "#94A3B8"
      fontSize: 14
      fontWeight: 500
  dark.stat-label:
    name: "Stat Label"
    category: text
    value:
      color: "#94A3B8"
      fontSize: 14
      fontWeight: 500

  light.stat-value:
    name: "Stat Value"
    category: text
    value:
      color: "#F8FAFC"
      fontSize: 32
      fontWeight: 700
  dark.stat-value:
    name: "Stat Value"
    category: text
    value:
      color: "#F8FAFC"
      fontSize: 32
      fontWeight: 700

components:
  stat_card:
    description: "Metric card"
    props: {}
    prop_schema:
      - name: label_key
        type: string
        required: true
      - name: value
        type: number
        required: true
      - name: unit
        type: string
        required: false
        default: ""
    widgets:
      - type: column
        style: card
        layout:
          type: column
          gap: 6
        widgets:
          - type: label
            text_key: "{{label_key}}"
            style: stat-label
          - type: label
            text: "{{value}}{{unit}}"
            style: stat-value

  routine_modal:
    description: "Modal demo"
    props: {}
    widgets:
      - type: column
        layout:
          type: column
          gap: 10
        widgets:
          - type: label
            text_key: "modal.title"
            style: heading
          - type: label
            text_key: "modal.body"
            style: body
          - type: row
            layout:
              type: row
              gap: 10
            widgets:
              - type: button
                text_key: "modal.close"
                style: ghost
                on_click: close_modal()
              - type: button
                text_key: "modal.start"
                style: cta
                on_click:
                  - set(welcome_message, status.modal)
                  - close_modal()

screens:
  showcase:
    name: showcase
    title: "YamUI Showcase"
    initial: true
    layout:
      type: column
      gap: 16
    widgets:
      - type: column
        id: main-column
        layout:
          type: column
          gap: 16
        width: "100%"
        widgets:
          - type: panel
            style: hero
            layout:
              type: column
              gap: 8
            widgets:
              - type: label
                text_key: "app.title"
                style: heading
              - type: label
                text_key: "app.subtitle"
                style: body

          - type: row
            id: metrics-row
            layout:
              type: row
              gap: 12
            width: "100%"
            widgets:
              - type: stat_card
                grow: 1
                props:
                  label_key: "cards.temperature"
                  value: "{{state.ui.temperature}}"
                  unit: "°"
              - type: stat_card
                grow: 1
                props:
                  label_key: "cards.humidity"
                  value: "{{state.ui.humidity}}"
                  unit: "%"
              - type: stat_card
                grow: 1
                props:
                  label_key: "cards.pressure"
                  value: "{{state.ui.pressure}}"
                  unit: " hPa"

          - type: panel
            style: card
            props:
              title_key: "panel.controls"
            layout:
              type: column
              gap: 10
            widgets:
              - type: row
                layout:
                  type: row
                  gap: 10
                  align: center
                widgets:
                  - type: label
                    text_key: "labels.theme"
                    style: heading
                  - type: switch
                    value: "{{state.ui.dark_mode}}"
                    on_change: set(ui.dark_mode, {{checked}})

              - type: row
                layout:
                  type: row
                  gap: 10
                widgets:
                  - type: button
                    text_key: "actions.english"
                    style: cta
                    on_click: set(ui.locale, en)
                  - type: button
                    text_key: "actions.spanish"
                    style: cta
                    on_click: set(ui.locale, es)

              - type: row
                layout:
                  type: row
                  gap: 12
                  align: center
                widgets:
                  - type: label
                    text_key: "labels.auto_start"
                    style: heading
                  - type: switch
                    value: "{{state.network.auto_start}}"
                    on_change: set(network.auto_start, {{checked}})
                  - type: checkbox
                    text_key: "labels.alerts"
                    value: "{{state.ui.alerts_enabled}}"
                    on_change: set(ui.alerts_enabled, {{checked}})
                  - type: spacer
                    size: 16
                  - type: label
                    text_key: "labels.security"
                    style: heading
                  - type: dropdown
                    value: "{{state.network.security}}"
                    options:
                      - Open
                      - WPA2
                      - WPA3
                    on_change: set(network.security, {{value}})

              - type: row
                layout:
                  type: row
                  gap: 10
                widgets:
                  - type: button
                    text_key: "actions.sync"
                    style: cta
                    enabled_if: "!state.async.sync_demo.running"
                    on_click:
                      - call(ui_async_reset, sync_demo)
                      - call(demo_async_sync, sync_demo)
                  - type: button
                    text_key: "actions.reset"
                    style: ghost
                    enabled_if: "!state.async.sync_demo.running"
                    on_click:
                      - call(ui_async_reset, sync_demo, status.sync_idle)
                      - set(welcome_message, status.ready)
                  - type: button
                    text_key: "actions.details"
                    style: ghost
                    on_click: push(details)
                  - type: button
                    text_key: "actions.modal"
                    style: ghost
                    on_click: modal(routine_modal)

              - type: label
                text: "Brightness: {{state.display.brightness}}"
                style: stat-label
              - type: slider
                min: 0
                max: 100
                value: "{{state.display.brightness}}"
                on_change: set(display.brightness, {{value}})
              - type: bar
                min: 0
                max: 100
                value: "{{state.display.brightness}}"
              - type: arc
                min: 0
                max: 100
                value: "{{state.display.brightness}}"
                on_change: set(display.brightness, {{value}})
              - type: label
                text: "Sync status: {{state.async.sync_demo.status}}"
                style: body
              - type: label
                text: "Progress: {{state.async.sync_demo.progress}}%"
                style: body

          - type: panel
            style: card
            props:
              title_key: "panel.camera"
            layout:
              type: column
              gap: 8
            widgets:
              - type: label
                text: "Camera preview loads only when opened."
                style: body
              - type: button
                text_key: "actions.open_camera"
                style: cta
                on_click: push(camera)
              - type: button
                text_key: "actions.open_widgets"
                style: ghost
                on_click: push(widgets)

          - type: row
            layout:
              type: row
              gap: 12
            width: "100%"
            widgets:
              - type: panel
                grow: 1
                style: card
                props:
                  title_key: "panel.profile"
                layout:
                  type: column
                  gap: 8
                widgets:
                  - type: label
                    text_key: "labels.profile_name"
                    style: stat-label
                  - type: textarea
                    id: profile-name
                    text: "{{state.profile.name}}"
                    placeholder_key: "labels.profile_name"
                    on_change: set(profile.name, {{value}})
                  - type: label
                    text_key: "labels.profile_note"
                    style: stat-label
                  - type: textarea
                    id: profile-note
                    text: "{{state.profile.note}}"
                    placeholder_key: "labels.profile_note"
                    on_focus: set(ui.keyboard_visible, true)
                    on_blur: set(ui.keyboard_visible, false)
                    on_change: set(profile.note, {{value}})
              - type: panel
                grow: 1
                style: card
                props:
                  title_key: "panel.activity"
                layout:
                  type: column
                  gap: 8
                widgets:
                  - type: list
                    height: 96
                    layout:
                      type: column
                      gap: 8
                    widgets:
                      - type: label
                        text_key: "activity.one"
                      - type: label
                        text_key: "activity.two"
                      - type: label
                        text_key: "activity.three"
                      - type: label
                        text_key: "activity.four"
                      - type: label
                        text_key: "activity.five"
                      - type: label
                        text_key: "activity.six"
                      - type: label
                        text_key: "activity.seven"
                      - type: label
                        text_key: "activity.eight"
                  - type: row
                    layout:
                      type: row
                      gap: 8
                      align: center
                    widgets:
                      - type: label
                        text_key: "labels.sync_count"
                        style: stat-label
                      - type: label
                        text: "{{state.ui.sync_count}}"
                        style: body
                  - type: label
                    text_key: "{{state.welcome_message}}"
                    style: body
                  - type: label
                    text: "Progress: {{state.async.sync_demo.progress}}%"
                    style: body

          - type: keyboard
            overlay: true
            visible_if: state.ui.keyboard_visible
            height: 300
            target: profile-note

  details:
    name: details
    title: "Details"
    layout:
      type: column
      gap: 16
    widgets:
      - type: panel
        style: hero
        layout:
          type: column
          gap: 8
        widgets:
          - type: label
            text_key: "screen.details"
            style: heading
          - type: label
            text_key: "detail.status"
            style: stat-label
          - type: label
            text_key: "{{state.welcome_message}}"
            style: body
          - type: label
            text: "Progress: {{state.async.sync_demo.progress}}%"
            style: body
          - type: label
            text: "Sync Count: {{state.ui.sync_count}}"
            style: body
          - type: button
            text_key: "actions.open_widgets"
            style: ghost
            on_click: push(widgets)
          - type: button
            text_key: "screen.back"
            style: cta
            on_click: pop()

  camera:
    name: camera
    title: "Camera"
    layout:
      type: column
      gap: 16
    widgets:
      - type: panel
        style: hero
        layout:
          type: column
          gap: 12
        widgets:
          - type: label
            text_key: "screen.camera"
            style: heading
          - type: camera_preview
            height: 260
          - type: button
            text_key: "screen.back"
            style: cta
            on_click: pop()

  widgets:
    name: widgets
    title: "Widgets"
    layout:
      type: column
      gap: 16
    widgets:
      - type: panel
        style: hero
        layout:
          type: column
          gap: 12
        widgets:
          - type: label
            text_key: "screen.widgets"
            style: heading
          - type: label
            text: "Lightweight LVGL widgets can be grouped here without living on the home screen."
            style: body
      - type: panel
        style: card
        props:
          title: "Roller"
        layout:
          type: column
          gap: 8
        widgets:
          - type: roller
            visible_row_count: 3
            options:
              - Eco
              - Balanced
              - Boost
              - Silent
            value: "{{state.demo.mode}}"
            on_change: set(demo.mode, {{value}})
          - type: label
            text: "Selected mode: {{state.demo.mode}}"
            style: body
      - type: panel
        style: card
        props:
          title: "LED"
        layout:
          type: column
          gap: 8
        widgets:
          - type: row
            layout:
              type: row
              gap: 12
              align: center
            widgets:
              - type: led
                width: 26
                height: 26
                color: "#22d3ee"
                value: "{{state.demo.led_level}}"
              - type: label
                text: "LED level: {{state.demo.led_level}}"
                style: body
          - type: slider
            min: 0
            max: 255
            value: "{{state.demo.led_level}}"
            on_change: set(demo.led_level, {{value}})
      - type: panel
        style: card
        props:
          title: "Table"
        layout:
          type: column
          gap: 8
        widgets:
          - type: label
            text: "Table is isolated on its own screen while we finish stabilizing it."
            style: body
          - type: button
            text_key: "actions.open_table"
            style: ghost
            on_click: push(table_demo)
      - type: button
        text_key: "screen.back"
        style: cta
        on_click: pop()

  table_demo:
    name: table_demo
    title: "Table"
    layout:
      type: column
      gap: 16
    widgets:
      - type: panel
        style: hero
        layout:
          type: column
          gap: 12
        widgets:
          - type: label
            text_key: "screen.table"
            style: heading
          - type: table
            height: 180
            column_widths:
              - 150
              - 150
            rows:
              - first: Widget
                second: State
              - first: Roller
                second: "{{state.demo.mode}}"
              - first: LED
                second: "{{state.demo.led_level}}"
              - first: Camera
                second: On demand
          - type: button
            text_key: "screen.back"
            style: cta
            on_click: pop()
