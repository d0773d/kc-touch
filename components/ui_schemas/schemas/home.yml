version: 2
app:
  name: "YamUI Sample Application"
  version: "0.1.0"
  author: "YamUI"
  initial_screen: main
  locale: en

state:
  welcome_message: "status.welcome"
  device_status:
    connected: "4"
    active: "3"
  ui:
    sync_count: "0"
    dark_mode: "false"
    locale: "en"

translations:
  en:
    label: "English"
    entries:
      app.device_overview: "Device Overview"
      panels.recent_activity: "Recent Activity"
      panels.online_devices: "Online Devices"
      panels.total_devices: "Total Devices"
      labels.dark_theme: "Dark Theme"
      actions.trigger_sync: "Trigger Sync"
      actions.english: "English"
      actions.spanish: "Español"
      activity.camera_connected: "Camera connected"
      activity.sensor_calibrated: "Sensor calibrated"
      activity.display_refreshed: "Display refreshed"
      status.welcome: "Welcome to YamUI"
      status.sync_requested: "Sync requested"
    metadata: {}
  es:
    label: "Español"
    entries:
      app.device_overview: "Panel de dispositivos"
      panels.recent_activity: "Actividad reciente"
      panels.online_devices: "Dispositivos en línea"
      panels.total_devices: "Dispositivos totales"
      labels.dark_theme: "Tema oscuro"
      actions.trigger_sync: "Iniciar sincronización"
      actions.english: "Inglés"
      actions.spanish: "Español"
      activity.camera_connected: "Cámara conectada"
      activity.sensor_calibrated: "Sensor calibrado"
      activity.display_refreshed: "Pantalla actualizada"
      status.welcome: "Bienvenido a YamUI"
      status.sync_requested: "Sincronización solicitada"
    metadata: {}

styles:
  light.card:
    name: "Card Surface"
    category: surface
    description: "Dark elevated card used for stats"
    value:
      backgroundColor: "#0F172A"
      color: "#E2E8F0"
      borderRadius: 8
      padding: 16
  dark.card:
    name: "Card Surface"
    category: surface
    description: "Dark elevated card used for stats"
    value:
      backgroundColor: "#0F172A"
      color: "#E2E8F0"
      borderRadius: 8
      padding: 16

  light.cta:
    name: "Primary CTA"
    category: surface
    description: "Button styling for primary actions"
    value:
      backgroundColor: "#22D3EE"
      color: "#0F172A"
      borderRadius: 999
      paddingHorizontal: 24
      paddingVertical: 12
  dark.cta:
    name: "Primary CTA"
    category: surface
    description: "Button styling for primary actions"
    value:
      backgroundColor: "#22D3EE"
      color: "#0F172A"
      borderRadius: 999
      paddingHorizontal: 24
      paddingVertical: 12

  light.heading:
    name: "Heading Text"
    category: text
    value:
      color: "#94A3B8"
      fontSize: 20
      fontWeight: 600
  dark.heading:
    name: "Heading Text"
    category: text
    value:
      color: "#94A3B8"
      fontSize: 20
      fontWeight: 600

  light.stat-label:
    name: "Stat Label"
    category: text
    value:
      color: "#94A3B8"
      fontSize: 14
      fontWeight: 500
  dark.stat-label:
    name: "Stat Label"
    category: text
    value:
      color: "#94A3B8"
      fontSize: 14
      fontWeight: 500

  light.stat-value:
    name: "Stat Value"
    category: text
    value:
      color: "#F8FAFC"
      fontSize: 32
      fontWeight: 700
  dark.stat-value:
    name: "Stat Value"
    category: text
    value:
      color: "#F8FAFC"
      fontSize: 32
      fontWeight: 700

components:
  stat_card:
    description: "Compact statistic card with value and label."
    props: {}
    prop_schema:
      - name: label_key
        type: string
        required: true
      - name: value
        type: number
        required: true
      - name: unit
        type: string
        required: false
        default: ""
    widgets:
      - type: column
        style: card
        layout:
          type: column
          gap: 6
        widgets:
          - type: label
            text_key: "{{label_key}}"
            style: stat-label
          - type: label
            text: "{{value}}{{unit}}"
            style: stat-value

screens:
  main:
    name: main
    title: "Sample Dashboard"
    initial: true
    layout:
      type: column
      gap: 16
    widgets:
      - type: column
        id: main-column
        layout:
          type: column
          gap: 16
        width: "100%"
        widgets:
          - type: label
            id: heading-label
            text_key: "app.device_overview"
            style: heading

          - type: row
            id: summary-row
            layout:
              type: row
              gap: 12
            width: "100%"
            widgets:
              - type: stat_card
                id: panel-online
                grow: 1
                props:
                  label_key: "panels.online_devices"
                  value: "{{state.device_status.active}}"
                  unit: " active"

              - type: stat_card
                id: panel-total
                grow: 1
                props:
                  label_key: "panels.total_devices"
                  value: "{{state.device_status.connected}}"
                  unit: " total"

          - type: panel
            id: panel-activity
            style: card
            props:
              title_key: "panels.recent_activity"
            layout:
              type: column
              gap: 8
            widgets:
              - type: spacer
                size: 4
              - type: list
                id: activity-list
                layout:
                  type: column
                  gap: 8
                widgets:
                  - type: label
                    text_key: "activity.camera_connected"
                  - type: label
                    text_key: "activity.sensor_calibrated"
                  - type: label
                    text_key: "activity.display_refreshed"

          - type: row
            layout:
              type: row
              gap: 10
              align: center
            widgets:
              - type: label
                text_key: "labels.dark_theme"
                style: heading
              - type: switch
                value: "{{state.ui.dark_mode}}"
                on_change: set(ui.dark_mode, {{checked}})

          - type: row
            layout:
              type: row
              gap: 8
            widgets:
              - type: button
                text_key: "actions.english"
                style: cta
                on_click: set(ui.locale, en)
              - type: button
                text_key: "actions.spanish"
                style: cta
                on_click: set(ui.locale, es)

          - type: button
            id: sync-button
            text_key: "actions.trigger_sync"
            style: cta
            events:
              onPress:
                - increment(ui.sync_count, 1)
                - set(welcome_message, status.sync_requested)

          - type: label
            text: "Sync Count: {{state.ui.sync_count}}"
            style: stat-label

          - type: label
            text_key: "{{state.welcome_message}}"


