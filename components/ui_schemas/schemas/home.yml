version: 2
app:
  name: "YamUI Sample Application"
  version: "0.1.0"
  author: "YamUI"
  initial_screen: main
  locale: en

state:
  welcome_message: "Welcome to YamUI"
  device_status.connected: "4"
  device_status.active: "3"
  ui.sync_count: "0"
  ui.dark_mode: "false"

translations:
  en:
    label: "English"
    entries:
      app.device_overview: "Device Overview"
      panels.recent_activity: "Recent Activity"
      panels.online_devices: "Online Devices"
      panels.total_devices: "Total Devices"
      actions.trigger_sync: "Trigger Sync"
    metadata: {}
  es:
    label: "Español"
    entries:
      app.device_overview: "Panel de dispositivos"
      panels.recent_activity: "Actividad reciente"
      actions.trigger_sync: "Iniciar sincronización"
    metadata: {}

styles:
  light.card:
    bg_color: "#0F172A"
    text_color: "#E2E8F0"
    radius: 8
    padding: 16
  dark.card:
    bg_color: "#0F172A"
    text_color: "#E2E8F0"
    radius: 8
    padding: 16

  light.cta:
    bg_color: "#22D3EE"
    text_color: "#0F172A"
    radius: 999
    padding_x: 24
    padding_y: 12
  dark.cta:
    bg_color: "#22D3EE"
    text_color: "#0F172A"
    radius: 999
    padding_x: 24
    padding_y: 12

  light.heading:
    text_color: "#94A3B8"
  dark.heading:
    text_color: "#94A3B8"

  light.stat-label:
    text_color: "#94A3B8"
  dark.stat-label:
    text_color: "#94A3B8"

  light.stat-value:
    text_color: "#F8FAFC"
  dark.stat-value:
    text_color: "#F8FAFC"

components:
  stat_card:
    props: [label, value, unit]
    layout:
      type: column
      gap: 4
    widgets:
      - type: label
        text: "{{label}}"
        style: stat-label
      - type: label
        text: "{{value}}{{unit}}"
        style: stat-value

screens:
  main:
    name: main
    title: "Sample Dashboard"
    initial: true
    layout:
      type: column
      gap: 16
    widgets:
      - type: column
        id: main-column
        layout:
          type: column
          gap: 16
        width: "100%"
        widgets:
          - type: label
            id: heading-label
            text: "Device Overview"
            style: heading

          - type: row
            id: summary-row
            layout:
              type: row
              gap: 12
            width: "100%"
            widgets:
              - type: panel
                id: panel-online
                style: card
                grow: 1
                layout:
                  type: column
                  gap: 6
                widgets:
                  - type: label
                    text: "Online Devices"
                    style: stat-label
                  - type: label
                    text: "{{device_status.active}} active"
                    style: stat-value

              - type: panel
                id: panel-total
                style: card
                grow: 1
                layout:
                  type: column
                  gap: 6
                widgets:
                  - type: label
                    text: "Total Devices"
                    style: stat-label
                  - type: label
                    text: "{{device_status.connected}} total"
                    style: stat-value

          - type: panel
            id: panel-activity
            style: card
            layout:
              type: column
              gap: 8
            widgets:
              - type: label
                text: "Recent Activity"
                style: stat-label
              - type: spacer
                size: 4
              - type: list
                id: activity-list
                layout:
                  type: column
                  gap: 8
                widgets:
                  - type: label
                    text: "Camera connected"
                  - type: label
                    text: "Sensor calibrated"
                  - type: label
                    text: "Display refreshed"

          - type: row
            layout:
              type: row
              gap: 10
              align: center
            widgets:
              - type: label
                text: "Dark Theme"
                style: heading
              - type: switch
                value: "{{ui.dark_mode}}"
                on_change: set(ui.dark_mode, {{checked}})

          - type: button
            id: sync-button
            text: "Trigger Sync"
            style: cta
            events:
              onPress:
                - increment(ui.sync_count, 1)
                - set(welcome_message, "Sync requested")

          - type: label
            text: "Sync Count: {{ui.sync_count}}"
            style: stat-label

          - type: label
            text: "{{welcome_message}}"
