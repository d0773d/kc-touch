name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - yam
      - "codex/**"

jobs:
  frontend:
    name: Frontend Test + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/yam-ui-generator/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tools/yam-ui-generator/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  backend:
    name: Backend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/yam-ui-generator/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Lint
        run: poetry run ruff check .

      - name: Run tests
        run: poetry run pytest -q --basetemp .pytest_tmp
